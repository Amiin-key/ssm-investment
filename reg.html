<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSM 2027 | Is-diiwaangali</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --primary: #00ff88; --bg: #050505; --card: #0f0f0f; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .reg-card { background: var(--card); padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid #222; }
        .logo { font-size: 24px; font-weight: 900; text-align: center; color: var(--primary); margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 12px; outline: none; }
        .upload-box { border: 2px dashed #333; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .upload-box:hover { border-color: var(--primary); }
        .btn-reg { width: 100%; padding: 15px; background: var(--primary); border: none; color: #000; font-weight: 900; border-radius: 12px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="reg-card">
        <div class="logo">SSM INVEST</div>
        <p style="text-align:center; font-size:13px; color:#666; margin-bottom:20px;">Kaliya muwaadiniinta Soomaaliyeed ayaa loo ogolyahay.</p>
        
        <form id="regForm">
            <input type="text" id="fullName" placeholder="Magaca oo buuxa" required>
            <input type="email" id="email" placeholder="Email-kaaga" required>
            <input type="password" id="password" placeholder="Password cusub" required>
            
            <p style="font-size:12px; color:#888; margin-top:10px;">Aqoonsiga (ID Card / Passport)</p>
            <div class="upload-box" onclick="document.getElementById('idFile').click()">
                <i class="fas fa-id-card" style="font-size:30px; color:var(--primary); margin-bottom:10px;"></i>
                <p id="fileName" style="font-size:11px;">Guji halkan si aad u soo rarto sawirka ID-ga</p>
                <input type="file" id="idFile" hidden accept="image/*" onchange="updateFileName(this)">
            </div>

            <button type="submit" class="btn-reg" id="regBtn">ABUUR ACCOUNT</button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBb-ImHhrN8XUe0Nihku-ZBSxUDCibaorA",
            authDomain: "://firebaseapp.com",
            projectId: "ssm-invest",
            storageBucket: "ssm-invest.firebasestorage.app",
            messagingSenderId: "1029622095378",
            appId: "1:1029622095378:web:01d95a354b582c0f7902cb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function updateFileName(input) {
            document.getElementById('fileName').innerText = "Sawirka waa la doortay: " + input.files[0].name;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const file = document.getElementById('idFile').files[0];
            if(!file) return alert("Fadlan soo rart sawirka ID-ga!");

            btn.disabled = true;
            btn.innerText = "WAA LA ABUURAYAA...";

            try {
                const res = await auth.createUserWithEmailAndPassword(email.value, password.value);
                
                // 1. Upload ID Image
                const storageRef = storage.ref(`id_cards/${res.user.uid}`);
                await storageRef.put(file);
                const idUrl = await storageRef.getDownloadURL();

                // 2. Add to Referrer (Invited Count)
                if (referrerId) {
                    await db.collection("users").doc(referrerId).update({
                        invitedCount: firebase.firestore.FieldValue.increment(1)
                    });
                }

                // 3. Create User Profile
                await db.collection("users").doc(res.user.uid).set({
                    fullName: fullName.value,
                    email: email.value,
                    idCardUrl: idUrl,
                    balance: 0,
                    referredBy: referrerId || null,
                    activeInvestments: [],
                    createdAt: new Date()
                });

                window.location.href = "index.html";
            } catch (err) { alert(err.message); btn.disabled = false; }
        });
    </script>
</body>
</html>
